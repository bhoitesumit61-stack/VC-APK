
name: voxlink_apk
description: A premium voice chat application built with Flutter and LiveKit.
version: 1.0.0+1

environment:
sdk: ">=3.0.0 <4.0.0"

dependencies:
flutter:
sdk: flutter
livekit_client: ^2.1.0
permission_handler: ^11.3.1
google_fonts: ^6.2.1
lucide_icons: ^0.335.0
http: ^1.2.1
provider: ^6.1.2
flutter_svg: ^2.0.10+1

dev_dependencies:
flutter_test:
sdk: flutter
flutter_lints: ^3.0.1

flutter:
uses-material-design: true
fonts:
- family: Cinzel
fonts:
- asset: assets/fonts/Cinzel-Regular.ttf
- asset: assets/fonts/Cinzel-Bold.ttf
- family: Outfit
fonts:
- asset: assets/fonts/Outfit-Regular.ttf
- asset: assets/fonts/Outfit-Bold.ttf
