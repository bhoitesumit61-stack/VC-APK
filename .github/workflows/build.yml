name: Build VoxLink APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: List repo contents (debug)
        run: ls -la

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter 3.22.3
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.3'
          channel: 'stable'
          cache: true

      - name: Find Flutter project folder
        id: find_project
        run: |
          if [ -f "pubspec.yaml" ]; then
            echo "project_dir=." >> $GITHUB_OUTPUT
          elif [ -f "voxlink_apk/pubspec.yaml" ]; then
            echo "project_dir=voxlink_apk" >> $GITHUB_OUTPUT
          else
            echo "❌ Could not find pubspec.yaml!"
            find . -name "pubspec.yaml" 2>/dev/null
            exit 1
          fi

      - name: Create local.properties
        run: |
          DIR=${{ steps.find_project.outputs.project_dir }}
          echo "sdk.dir=$ANDROID_HOME" > $DIR/android/local.properties
          echo "flutter.sdk=$FLUTTER_ROOT" >> $DIR/android/local.properties
          echo "flutter.versionCode=1" >> $DIR/android/local.properties
          echo "flutter.versionName=1.0.0" >> $DIR/android/local.properties

      - name: Install Flutter dependencies
        run: flutter pub get
        working-directory: ${{ steps.find_project.outputs.project_dir }}

      - name: Build Release APK
        run: flutter build apk --release --no-tree-shake-icons
        working-directory: ${{ steps.find_project.outputs.project_dir }}

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: VoxLink-Release-APK
          path: "**/flutter-apk/app-release.apk"
          retention-days: 30
