name: Build VoxLink APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter 3.22.3
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.3'
          channel: 'stable'
          cache: true

      - name: Create fresh Flutter project
        run: |
          flutter create --org com.voxlink --project-name voxlink_app /tmp/voxlink_app

      - name: Inject our VoxLink main.dart
        run: |
          cp voxlink_apk/lib/main.dart /tmp/voxlink_app/lib/main.dart

      - name: Inject our pubspec.yaml
        run: |
          cp voxlink_apk/pubspec.yaml /tmp/voxlink_app/pubspec.yaml

      - name: Add AndroidX support
        run: |
          echo "android.useAndroidX=true" >> /tmp/voxlink_app/android/gradle.properties
          echo "android.enableJetifier=true" >> /tmp/voxlink_app/android/gradle.properties

      - name: Install dependencies
        working-directory: /tmp/voxlink_app
        run: flutter pub get

      - name: Build Release APK
        working-directory: /tmp/voxlink_app
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: VoxLink-Release-APK
          path: /tmp/voxlink_app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
