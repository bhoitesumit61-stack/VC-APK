name: Build VoxLink APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter 3.22.3
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.3'
          channel: 'stable'
          cache: true

      - name: Generate missing launcher icons
        run: |
          flutter create --project-name temp_icons /tmp/temp_flutter
          cp -r /tmp/temp_flutter/android/app/src/main/res/mipmap-* \
            voxlink_apk/android/app/src/main/res/

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > voxlink_apk/android/local.properties
          echo "flutter.sdk=$FLUTTER_ROOT" >> voxlink_apk/android/local.properties
          echo "flutter.versionCode=1" >> voxlink_apk/android/local.properties
          echo "flutter.versionName=1.0.0" >> voxlink_apk/android/local.properties

      - name: Install Flutter dependencies
        working-directory: voxlink_apk
        run: flutter pub get

      - name: Build Release APK
        working-directory: voxlink_apk
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: VoxLink-Release-APK
          path: voxlink_apk/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
